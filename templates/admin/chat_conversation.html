{% extends "admin/base_site.html" %}

{% block content %}
<style>
    .chat-container{display:flex;height:80vh;background:#fff;border-radius:16px;border:1px solid #e8eaed;overflow:hidden}
    .sidebar{width:320px;border-right:1px solid #e8eaed;display:flex;flex-direction:column;background:#fff}
    .sidebar-header{padding:20px;border-bottom:1px solid #e8eaed;background:#fafbfc}
    .sidebar-header h2{font-size:18px;font-weight:600;margin:0 0 4px}
    .sidebar-header p{font-size:12px;color:#5f6368;margin:0}
    .conv-list{flex:1;overflow-y:auto}
    .conv-item{padding:16px 20px;border-bottom:1px solid #f0f0f0;cursor:pointer;display:flex;gap:12px;align-items:center}
    .conv-item:hover{background:#f8f9fa}
    .conv-item.active{background:#e8f0fe;border-left:3px solid #1a73e8}
    .avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:18px;flex-shrink:0}
    .conv-info{flex:1;min-width:0}
    .conv-name{font-weight:600;color:#1f1f1f;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
    .conv-preview{font-size:12px;color:#5f6368;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-time{font-size:10px;color:#9aa0a6}
    .unread-badge{background:#1a73e8;color:#fff;border-radius:16px;padding:2px 8px;font-size:11px;font-weight:600}
    .chat-panel{flex:1;display:flex;flex-direction:column;background:#fff}
    .chat-header{padding:20px 24px;border-bottom:1px solid #e8eaed}
    .chat-header h3{font-size:18px;font-weight:600;margin:0}
    .chat-header p{font-size:12px;color:#5f6368;margin:4px 0 0}
    .messages-area{flex:1;overflow-y:auto;padding:24px;background:#fafbfc;display:flex;flex-direction:column;gap:12px}
    .message{display:flex;max-width:75%}
    .message.admin{align-self:flex-end;justify-content:flex-end}
    .message.customer{align-self:flex-start}
    .message-bubble{padding:10px 14px;border-radius:18px;word-wrap:break-word}
    .message.admin .message-bubble{background:#1a73e8;color:#fff;border-bottom-right-radius:4px}
    .message.customer .message-bubble{background:#fff;color:#1f1f1f;border:1px solid #e8eaed;border-bottom-left-radius:4px}
    .message-text{font-size:14px;line-height:1.5}
    .message-time{font-size:10px;margin-top:6px;display:flex;gap:4px;align-items:center}
    .message.admin .message-time{justify-content:flex-end;color:rgba(255,255,255,.7)}
    .message.customer .message-time{color:#9aa0a6}
    .date-sep{text-align:center;margin:16px 0 8px}
    .date-sep span{background:#e8eaed;padding:4px 12px;border-radius:20px;font-size:11px;color:#5f6368;display:inline-block}
    .reply-area{padding:16px 24px 24px;border-top:1px solid #e8eaed}
    .reply-form{display:flex;gap:12px;align-items:flex-end}
    .reply-input{flex:1;padding:12px 16px;border:1px solid #dadce0;border-radius:24px;font-family:inherit;font-size:14px;resize:none}
    .reply-input:focus{outline:none;border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.1)}
    .send-btn{background:#1a73e8;color:#fff;border:none;border-radius:24px;padding:12px 28px;cursor:pointer;font-weight:500}
    .send-btn:hover{background:#1557b0;transform:translateY(-1px)}
    .send-btn:disabled{opacity:.6;cursor:not-allowed}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#9aa0a6;text-align:center;padding:40px}
    .empty-state-icon{font-size:64px;margin-bottom:16px;opacity:.5}
    .scroll-btn{position:fixed;bottom:100px;right:40px;background:#1a73e8;color:#fff;border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .scroll-btn:hover{background:#1557b0;transform:scale(1.05)}
    .loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .message{animation:fadeIn .2s ease-out}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#f1f1f1}
    ::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}
    @media (max-width:768px){.chat-container{flex-direction:column}.sidebar{width:100%;height:40%;border-right:none;border-bottom:1px solid #e8eaed}.chat-panel{height:60%}.scroll-btn{bottom:120px;right:20px}}
</style>

<div class="chat-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 Conversations</h2>
            <p>Customers who messaged you</p>
        </div>
        <div class="conv-list" id="convList"><div style="text-align:center;padding:40px;color:#9aa0a6;">Loading...</div></div>
    </div>
    <div class="chat-panel" id="chatPanel">
        <div class="empty-state"><div class="empty-state-icon">💬</div><h3>Select a conversation</h3><p>Choose a customer from the left panel</p></div>
    </div>
</div>
<button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">↓</button>

<script>
    let currentUserId = null, currentUserName = null, messagesArea = null;
    
    function getCSRF(){let c=null;if(document.cookie&&document.cookie!==''){document.cookie.split(';').forEach(cookie=>{let t=cookie.trim();if(t.substring(0,10)==='csrftoken=')c=decodeURIComponent(t.substring(10))})}return c}
    function escapeHtml(t){if(!t)return '';let d=document.createElement('div');d.textContent=t;return d.innerHTML}
    function formatTime(d){let date=new Date(d),now=new Date(),days=Math.floor((now-date)/(1000*60*60*24));if(days===0)return date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(days===1)return'Yesterday';if(days<7)return`${days}d ago`;return date.toLocaleDateString()}
    function formatDate(d){return new Date(d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
    function scrollToBottom(){if(messagesArea)messagesArea.scrollTop=messagesArea.scrollHeight}
    function toggleScrollBtn(){let btn=document.getElementById('scrollBtn');if(!btn||!messagesArea)return;btn.style.display=messagesArea.scrollHeight-messagesArea.scrollTop-messagesArea.clientHeight<100?'none':'flex'}
    
    function loadConversations(){
        fetch('/api/messages/').then(r=>r.json()).then(data=>{
            let msgs=data.results||data,convs={},curr={{ request.user.id }};
            msgs.forEach(m=>{let other=m.sender===curr?m.receiver:m.sender,name=m.sender===curr?m.receiver_name:m.sender_name||`User ${other}`;
                if(!convs[other])convs[other]={id:other,name:name,last_message:m.message,last_time:m.created_at,unread:(!m.is_read&&m.receiver===curr)?1:0};
                else{if(new Date(m.created_at)>new Date(convs[other].last_time)){convs[other].last_message=m.message;convs[other].last_time=m.created_at}
                if(!m.is_read&&m.receiver===curr)convs[other].unread++}});
            let arr=Object.values(convs).sort((a,b)=>new Date(b.last_time)-new Date(a.last_time));
            renderConversations(arr)}).catch(e=>console.error(e))}
    
    function renderConversations(convs){
        let container=document.getElementById('convList');
        if(convs.length===0){container.innerHTML='<div style="text-align:center;padding:40px;color:#9aa0a6;"><div style="font-size:48px;margin-bottom:16px;">💬</div><p>No messages yet</p></div>';return}
        container.innerHTML=convs.map(c=>`<div class="conv-item ${currentUserId===c.id?'active':''}" onclick="selectConversation(${c.id},'${escapeHtml(c.name)}')">
            <div class="avatar">${escapeHtml(c.name.charAt(0).toUpperCase())}</div>
            <div class="conv-info"><div class="conv-name"><span>${escapeHtml(c.name)}</span><span class="conv-time">${formatTime(c.last_time)}</span></div>
            <div class="conv-preview">${escapeHtml(c.last_message.substring(0,60))}${c.last_message.length>60?'...':''}</div></div>
            ${c.unread>0?`<div class="unread-badge">${c.unread>99?'99+':c.unread}</div>`:''}</div>`).join('')}
    
    function selectConversation(id,name){currentUserId=id;currentUserName=name;document.querySelectorAll('.conv-item').forEach(i=>i.classList.remove('active'));loadMessages(id)}
    
    function loadMessages(id){
        fetch('/api/messages/').then(r=>r.json()).then(data=>{
            let msgs=data.results||data,curr={{ request.user.id }},filtered=msgs.filter(m=>(m.sender===curr&&m.receiver===id)||(m.sender===id&&m.receiver===curr));
            filtered.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
            renderChat(filtered);
            filtered.forEach(m=>{if(!m.is_read&&m.receiver===curr)fetch(`/api/messages/${m.message_id}/mark_read/`,{method:'POST',headers:{'X-CSRFToken':getCSRF()}}).catch(e=>console.error(e))});
            loadConversations();
            setTimeout(()=>{if(messagesArea)messagesArea.scrollTop=messagesArea.scrollHeight},100)}).catch(e=>console.error(e))}
    
    function renderChat(msgs){
        let panel=document.getElementById('chatPanel'),curr={{ request.user.id }};
        if(!currentUserId){panel.innerHTML='<div class="empty-state"><div class="empty-state-icon">💬</div><h3>Select a conversation</h3></div>';return}
        let lastDate='',html='';
        msgs.forEach(m=>{let date=new Date(m.created_at).toDateString(),isAdmin=m.sender===curr,time=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            if(date!==lastDate){html+=`<div class="date-sep"><span>${formatDate(m.created_at)}</span></div>`;lastDate=date}
            html+=`<div class="message ${isAdmin?'admin':'customer'}"><div class="message-bubble"><div class="message-text">${escapeHtml(m.message)}</div>
            <div class="message-time">${time}${isAdmin?(m.is_read?'✓✓':'✓'):''}</div></div></div>`});
        if(msgs.length===0)html='<div style="text-align:center;color:#9aa0a6;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">💬</div><p>No messages yet</p></div>';
        panel.innerHTML=`<div class="chat-header"><h3>${escapeHtml(currentUserName)}</h3><p>Customer</p></div>
            <div class="messages-area" id="messagesArea">${html}</div>
            <div class="reply-area"><form class="reply-form" onsubmit="sendMessage(event)">
            <textarea class="reply-input" id="msgInput" rows="1" placeholder="Type your reply..." required></textarea>
            <button type="submit" class="send-btn" id="sendBtn">Send</button></form></div>`;
        messagesArea=document.getElementById('messagesArea');if(messagesArea){messagesArea.addEventListener('scroll',toggleScrollBtn);toggleScrollBtn()}
        let ta=document.getElementById('msgInput');if(ta){ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});ta.focus()}}
    
    function sendMessage(e){
        e.preventDefault();let input=document.getElementById('msgInput'),msg=input.value.trim(),btn=document.getElementById('sendBtn');
        if(!msg||!currentUserId){if(!msg)input.style.borderColor='#d93025';return}
        btn.disabled=true;btn.innerHTML='<span class="loading-spinner"></span>';
        fetch('/api/messages/',{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':getCSRF()},body:JSON.stringify({receiver:currentUserId,message:msg})})
        .then(r=>r.json()).then(()=>{input.value='';input.style.height='auto';loadMessages(currentUserId);loadConversations();btn.disabled=false;btn.innerHTML='Send'})
        .catch(e=>{console.error(e);btn.disabled=false;btn.innerHTML='Send';alert('Failed to send')})}
    
    loadConversations();
</script>
{% endblock %}
