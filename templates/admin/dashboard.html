{% extends "admin/base_site.html" %}
{% block content %}
<div style="padding: 20px;">
    <h1>Quick Overview</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0;">
        <div style="background: #f8f9fa; padding: 20px; border-radius: 10px;">
            <h3>Total Orders</h3>
            <p style="font-size: 32px; font-weight: bold;">{{ total_orders }}</p>
        </div>
        <div style="background: #fff3cd; padding: 20px; border-radius: 10px;">
            <h3>Pending Orders</h3>
            <p style="font-size: 32px; font-weight: bold;">{{ pending_orders }}</p>
        </div>
        <div style="background: #d1ecf1; padding: 20px; border-radius: 10px;">
            <h3>Products</h3>
            <p style="font-size: 32px; font-weight: bold;">{{ total_products }}</p>
        </div>
        <div style="background: #f8d7da; padding: 20px; border-radius: 10px;">
            <h3>Out of Stock</h3>
            <p style="font-size: 32px; font-weight: bold;">{{ out_of_stock }}</p>
        </div>
    </div>
</div>
{% endblock %}
